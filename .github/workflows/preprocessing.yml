name: Automated Preprocessing Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest
    name: Run Preprocessing Pipeline

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run Preprocessing Automate Script
        run: |
          python preprocessing/automate_Dea-Zasqia-Pasaribu-Malau.py \
            --input credit_scoring_raw.csv \
            --output preprocessing/credit_scoring_preprocessing

      - name: Verify Output Files
        run: |
          ls -lh preprocessing/credit_scoring_preprocessing/
          python -c "
          import pandas as pd
          X_train = pd.read_csv('preprocessing/credit_scoring_preprocessing/X_train.csv')
          assert X_train.isnull().sum().sum() == 0
          print('Preprocessing berhasil!')
          "

      - name: Upload Preprocessed Dataset as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: credit_scoring_preprocessed
          path: preprocessing/credit_scoring_preprocessing/
          retention-days: 30

      - name: Commit Preprocessed Data to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/credit_scoring_preprocessing/
          git diff --staged --quiet || git commit -m "chore: update preprocessed dataset [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
